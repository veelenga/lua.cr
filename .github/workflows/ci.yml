name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 1 * *"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crystal: [latest]
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y liblua5.4-dev

      - name: Install dependencies
        run: shards install

      - name: Run specs
        run: crystal spec

      - name: Run linter
        run: ./bin/ameba
